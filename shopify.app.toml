name = "BatchGuard — Lot & Expiry Tracking"
client_id = "df413c77e6ed80c6b0115f1d00a9e73e"
application_url = "https://batchguard-lot-expiry-tracking.onrender.com"
embedded = true

[access_scopes]
scopes = "read_products,write_products,read_orders"

[auth]
redirect_urls = [
  "https://batchguard-lot-expiry-tracking.onrender.com/auth/callback",
  "https://batchguard-lot-expiry-tracking.onrender.com/auth/shopify/callback",
  "https://batchguard-lot-expiry-tracking.onrender.com/api/auth/callback"
]

[webhooks]
api_version = "2026-07"

[[webhooks.subscriptions]]
topics = ["orders/create"]
uri = "/webhooks/orders/create"

[[webhooks.subscriptions]]
topics = ["customers/data_request"]
uri = "/webhooks/customers/data_request"

[[webhooks.subscriptions]]
topics = ["customers/redact"]
uri = "/webhooks/customers/redact"

[[webhooks.subscriptions]]
topics = ["shop/redact"]
uri = "/webhooks/shop/redact"

[[webhooks.subscriptions]]
topics = ["app/uninstalled"]
uri = "/webhooks/app/uninstalled"
