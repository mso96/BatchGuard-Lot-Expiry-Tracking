services:
  - type: web
    name: batchguard-lot-expiry-tracking
    runtime: node
    plan: starter
    buildCommand: npm ci --include=dev && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /app
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: batchguard-postgres
          property: connectionString
      - key: SHOPIFY_API_KEY
        value: df413c77e6ed80c6b0115f1d00a9e73e
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: BATCHGUARD_BILLING_TEST_MODE
        value: "false"
databases:
  - name: batchguard-postgres
    plan: starter
